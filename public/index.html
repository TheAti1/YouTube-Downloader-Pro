<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader Pro</title>
  <meta name="description" content="Premium YouTube video, MP3 ve playlist indirme aracı">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span class="logo-text">YT Downloader<span class="logo-pro">PRO</span></span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-selector" id="langSelector">
        <button class="lang-btn" id="langBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="currentLangName">Türkçe</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="lang-dropdown" id="langDropdown"></div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Tema Değiştir">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Hero Section with URL Input -->
    <section class="hero">
      <h1 class="hero-title" data-i18n="heroTitle">YouTube'dan Her Şeyi İndir</h1>
      <p class="hero-subtitle" data-i18n="heroSubtitle">Video, müzik, playlist, altyazı ve daha fazlası — tek tıkla!</p>
      
      <div class="url-input-container">
        <div class="url-input-wrapper">
          <svg class="url-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <input type="text" id="urlInput" class="url-input" data-i18n-placeholder="urlPlaceholder" placeholder="YouTube URL'sini buraya yapıştırın..." autofocus>
          <button id="pasteBtn" class="paste-btn" title="Yapıştır">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
          </button>
        </div>
        <button id="analyzeBtn" class="analyze-btn" data-i18n="analyzeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span data-i18n="analyzeBtn">Analiz Et</span>
        </button>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-btn" data-action="batch" data-i18n="batchDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          Toplu İndirme
        </button>
        <button class="quick-btn" data-action="history" data-i18n="downloadHistory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          İndirme Geçmişi
        </button>
      </div>
    </section>

    <!-- Loading Indicator -->
    <div class="loading-section" id="loadingSection" style="display:none">
      <div class="loading-spinner"></div>
      <p class="loading-text" data-i18n="analyzing">Video analiz ediliyor...</p>
    </div>

    <!-- Error Message -->
    <div class="error-section" id="errorSection" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p class="error-text" id="errorText"></p>
      <button class="retry-btn" id="retryBtn" data-i18n="retry">Tekrar Dene</button>
    </div>

    <!-- Video Info Card -->
    <section class="video-card" id="videoCard" style="display:none">
      <div class="video-preview">
        <img id="videoThumbnail" class="video-thumbnail" alt="Video Thumbnail">
        <div class="video-duration" id="videoDuration"></div>
      </div>
      <div class="video-info">
        <h2 class="video-title" id="videoTitle"></h2>
        <div class="video-meta">
          <span class="video-channel" id="videoChannel"></span>
          <span class="video-views" id="videoViews"></span>
          <span class="video-date" id="videoDate"></span>
        </div>
      </div>
    </section>

    <!-- Download Options -->
    <section class="download-options" id="downloadOptions" style="display:none">
      <!-- Tab Navigation -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="video" data-i18n="videoTab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
            <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
            <line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/>
            <line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>
            <line x1="17" y1="17" x2="22" y2="17"/>
          </svg>
          Video
        </button>
        <button class="tab-btn" data-tab="audio" data-i18n="audioTab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          Ses / MP3
        </button>
        <button class="tab-btn" data-tab="subtitle" data-i18n="subtitleTab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="14" x2="18" y2="14"/><line x1="6" y1="18" x2="14" y2="18"/>
          </svg>
          Altyazı
        </button>
        <button class="tab-btn" data-tab="thumbnail" data-i18n="thumbnailTab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          Thumbnail
        </button>
      </div>

      <!-- Video Tab -->
      <div class="tab-content active" id="tab-video">
        <div class="quality-grid">
          <button class="quality-btn" data-quality="2160"><span class="quality-label">4K</span><span class="quality-desc">2160p</span></button>
          <button class="quality-btn" data-quality="1440"><span class="quality-label">2K</span><span class="quality-desc">1440p</span></button>
          <button class="quality-btn selected" data-quality="1080"><span class="quality-label">FHD</span><span class="quality-desc">1080p</span></button>
          <button class="quality-btn" data-quality="720"><span class="quality-label">HD</span><span class="quality-desc">720p</span></button>
          <button class="quality-btn" data-quality="480"><span class="quality-label">SD</span><span class="quality-desc">480p</span></button>
          <button class="quality-btn" data-quality="360"><span class="quality-label">Low</span><span class="quality-desc">360p</span></button>
          <button class="quality-btn" data-quality="best"><span class="quality-label">MAX</span><span class="quality-desc" data-i18n="bestQuality">En İyi</span></button>
        </div>

        <!-- Video Audio Option -->
        <div class="audio-inclusion-section" style="margin-top: 20px; text-align: left; margin-bottom: 20px;">
          <label style="font-size: 0.9rem; margin-bottom: 8px; display: block; color: var(--text-muted)">Ses Tercihi</label>
          <div class="format-options" style="display: flex; gap: 10px;">
            <button class="format-btn video-audio-btn selected" data-audio="yes" style="flex: 1">Sesli İndir (Normal)</button>
            <button class="format-btn video-audio-btn" data-audio="no" style="flex: 1">Sessiz İndir (Sadece Görüntü)</button>
          </div>
        </div>

        <!-- Trim Section -->
        <div class="trim-section">
          <label class="trim-toggle">
            <input type="checkbox" id="trimToggle">
            <span class="trim-toggle-slider"></span>
            <span data-i18n="trimVideo">Video Kırpma</span>
          </label>
          <div class="trim-inputs" id="trimInputs" style="display:none">
            <div class="trim-field">
              <label data-i18n="startTime">Başlangıç</label>
              <input type="text" id="trimStart" placeholder="00:00:00" class="trim-input">
            </div>
            <span class="trim-dash">—</span>
            <div class="trim-field">
              <label data-i18n="endTime">Bitiş</label>
              <input type="text" id="trimEnd" placeholder="00:05:00" class="trim-input">
            </div>
          </div>
        </div>

        <button class="download-btn" id="downloadVideoBtn" data-i18n="downloadVideo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Video İndir
        </button>
      </div>

      <!-- Audio Tab -->
      <div class="tab-content" id="tab-audio">
        <div class="audio-format-grid">
          <button class="format-btn selected" data-format="mp3"><span class="format-label">MP3</span><span class="format-desc" data-i18n="popular">Popüler</span></button>
          <button class="format-btn" data-format="m4a"><span class="format-label">M4A</span><span class="format-desc">AAC</span></button>
          <button class="format-btn" data-format="flac"><span class="format-label">FLAC</span><span class="format-desc" data-i18n="lossless">Kayıpsız</span></button>
          <button class="format-btn" data-format="wav"><span class="format-label">WAV</span><span class="format-desc" data-i18n="uncompressed">Ham</span></button>
          <button class="format-btn" data-format="opus"><span class="format-label">OPUS</span><span class="format-desc" data-i18n="efficient">Verimli</span></button>
          <button class="format-btn" data-format="vorbis"><span class="format-label">OGG</span><span class="format-desc">Vorbis</span></button>
        </div>

        <div class="audio-quality-section">
          <label data-i18n="audioQuality">Ses Kalitesi</label>
          <select id="audioQualitySelect" class="quality-select">
            <option value="0" data-i18n="bestQuality">En İyi (320kbps)</option>
            <option value="2">Yüksek (256kbps)</option>
            <option value="5" data-i18n="medium">Orta (128kbps)</option>
            <option value="9" data-i18n="low">Düşük (64kbps)</option>
          </select>
        </div>

        <button class="download-btn audio-btn" id="downloadAudioBtn" data-i18n="downloadAudio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          Ses İndir
        </button>
      </div>

      <!-- Subtitle Tab -->
      <div class="tab-content" id="tab-subtitle">
        <div class="subtitle-list" id="subtitleList">
          <p class="no-data" data-i18n="noSubtitles">Altyazı bulunamadı</p>
        </div>
      </div>

      <!-- Thumbnail Tab -->
      <div class="tab-content" id="tab-thumbnail">
        <div class="thumbnail-preview">
          <img id="thumbnailPreview" class="thumbnail-large" alt="Thumbnail">
        </div>
        <button class="download-btn thumbnail-btn" id="downloadThumbnailBtn" data-i18n="downloadThumbnail">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          Thumbnail İndir
        </button>
      </div>
    </section>

    <!-- Playlist Section -->
    <section class="playlist-section" id="playlistSection" style="display:none">
      <div class="playlist-header">
        <div class="playlist-info">
          <h2 class="playlist-title" id="playlistTitle"></h2>
          <span class="playlist-count" id="playlistCount"></span>
        </div>
        <div class="playlist-actions">
          <button class="select-all-btn" id="selectAllBtn" data-i18n="selectAll">Tümünü Seç</button>
          <select id="playlistFormat" class="quality-select">
            <option value="video" data-i18n="videoTab">Video (MP4)</option>
            <option value="audio">Ses (MP3)</option>
          </select>
          <select id="playlistQuality" class="quality-select">
            <option value="best" data-i18n="bestQuality">En İyi</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
          </select>
          <button class="download-btn playlist-dl-btn" id="downloadPlaylistBtn" data-i18n="downloadSelected">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Seçilenleri İndir
          </button>
        </div>
      </div>
      <div class="playlist-videos" id="playlistVideos"></div>
    </section>

    <!-- Batch Download Modal -->
    <div class="modal-overlay" id="batchModal" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3 data-i18n="batchDownload">Toplu İndirme</h3>
          <button class="modal-close" id="closeBatchModal">&times;</button>
        </div>
        <div class="modal-body">
          <p data-i18n="batchDesc">Her satıra bir URL yazın:</p>
          <textarea id="batchUrls" class="batch-textarea" rows="8" placeholder="https://youtube.com/watch?v=...&#10;https://youtube.com/watch?v=...&#10;https://youtube.com/watch?v=..."></textarea>
          <div class="batch-options">
            <select id="batchFormat" class="quality-select">
              <option value="video">Video (MP4)</option>
              <option value="audio">Ses (MP3)</option>
            </select>
            <select id="batchQuality" class="quality-select">
              <option value="best" data-i18n="bestQuality">En İyi</option>
              <option value="1080">1080p</option>
              <option value="720">720p</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="download-btn" id="startBatchBtn" data-i18n="startDownload">
            İndirmeyi Başlat
          </button>
        </div>
      </div>
    </div>

    <!-- Download Queue -->
    <section class="queue-section" id="queueSection" style="display:none">
      <div class="queue-header">
        <h3 class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span data-i18n="activeDownloads">Aktif İndirmeler</span>
        </h3>
        <button class="save-all-btn" id="saveAllBtn" data-i18n="saveAllFolder" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Klasöre Kaydet
        </button>
      </div>
      <div class="queue-list" id="queueList"></div>
    </section>

    <!-- History Section -->
    <section class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <h3 class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span data-i18n="downloadHistory">İndirme Geçmişi</span>
        </h3>
        <button class="clear-history-btn" id="clearHistoryBtn" data-i18n="clearHistory">Geçmişi Temizle</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <button class="back-btn" id="backFromHistory" data-i18n="goBack">
        ← Geri Dön
      </button>
    </section>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="langs.js"></script>
  <script src="app.js"></script>
</body>
</html>
